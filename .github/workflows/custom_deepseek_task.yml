name: 定制执行任务（DeepSeek）

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "运行模式"
        required: true
        type: choice
        default: "stocks-only"
        options:
          - full
          - stocks-only
          - market-only
      stocks:
        description: "股票列表（逗号分隔，例如 600519,00700,AAPL）"
        required: false
        default: "600519"
        type: string
      model:
        description: "OpenAI-compatible 模型名（默认 deepseek-v4-pro）"
        required: true
        default: "deepseek-v4-pro"
        type: string
      openai_base_url:
        description: "OpenAI-compatible Base URL"
        required: true
        default: "https://api.deepseek.com"
        type: string
      force_run:
        description: "强制运行（跳过交易日检查）"
        required: false
        default: false
        type: boolean

concurrency:
  group: custom-deepseek-task
  cancel-in-progress: false

jobs:
  run-custom-task:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ github.event.inputs.openai_base_url }}
      OPENAI_MODEL: ${{ github.event.inputs.model }}
      LITELLM_MODEL: openai/${{ github.event.inputs.model }}
      STOCK_LIST: ${{ github.event.inputs.stocks }}
      REPORT_TYPE: simple
      LOG_LEVEL: INFO
    steps:
      - name: 检查 OPENAI_API_KEY
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "❌ 未配置 OPENAI_API_KEY，请在 Settings → Secrets and variables → Actions 新增仓库密钥。"
            exit 1
          fi

      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: 创建必要目录
        run: mkdir -p data logs reports

      - name: 执行任务
        run: |
          MODE="${{ github.event.inputs.run_mode }}"
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
          fi

          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi

      - name: 上传结果
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: custom-task-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 14
